spring:
  application:
    name: demo1
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/raki?characterEncoding=UTF-8&serverTimezone=GMT
    username: root
    password: Raki0925
    type: com.alibaba.druid.pool.DruidDataSource

    druid:
      initial-size: 5
      min-idle: 10
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-on-borrow: true
      test-while-idle: true
      test-on-return: false

server:
  servlet:
    context-path: /raki
  port: 8080

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.example.demo1.controller
# knife4j的增强配置，不需要增强可以不配
#knife4j：
#  enable: true
#  setting:
#    language:zh_cn
#    swagger-model-name：实体类列表

mybatis-plus:
  configuration:
# MyBatis 配m 开服舵峰功能
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
#为MyBati引用的实体类白定文义開名
  type-aliases-package: com.example.demo1.entity